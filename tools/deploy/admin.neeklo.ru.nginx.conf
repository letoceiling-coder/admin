# admin.neeklo.ru — ТОЛЬКО этот домен (образец)
# НЕ копировать поверх всех сайтов на сервере. Добавить как отдельный файл
# в sites-available и симлинк в sites-enabled, не удаляя и не затирая другие конфиги.
# См. docs/RESTORE_SITES_AND_CERTIFICATES.md при проблемах с доменами/сертификатами.
#
# HTTP -> redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name admin.neeklo.ru;
    location = /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — root: папка public Laravel-приложения (если проект в подпапке admin — укажите root .../admin/public;)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.neeklo.ru;
    root /var/www/admin.neeklo.ru/public;
    index index.php;
    charset utf-8;

    ssl_certificate /etc/letsencrypt/live/admin.neeklo.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.neeklo.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
    error_page 404 /index.php;
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
    }

    # Telegram bot webhook (бот слушает на 8088)
    location /webhook {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_request_body on;
        proxy_pass_request_headers on;
    }
}
