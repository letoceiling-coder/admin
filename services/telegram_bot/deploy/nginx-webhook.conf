# Проброс webhook Telegram к боту (MODE=webhook).
# Бот слушает на 127.0.0.1:HEALTH_PORT (по умолчанию 8088), путь WEBHOOK_PATH (по умолчанию /webhook).
# Включите в server { } для домена с HTTPS (например admin.neeklo.ru):
#
#   include /path/to/services/telegram_bot/deploy/nginx-webhook.conf;
#
# В .env бота задайте: WEBHOOK_BASE_URL=https://admin.neeklo.ru (без слэша в конце).

location /webhook {
    proxy_pass http://127.0.0.1:8088;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    # Telegram присылает тело запроса
    proxy_set_header Content-Type $content_type;
    proxy_pass_request_body on;
    proxy_pass_request_headers on;
}

# Опционально: health бота по тому же порту
location /telegram-bot/health {
    proxy_pass http://127.0.0.1:8088/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    access_log off;
}
