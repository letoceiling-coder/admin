# Опционально: проброс /health бота через Nginx.
# Включите в http или server (например, в конфиг admin.example.com):
#
#   include /opt/admin-crm/services/telegram_bot/deploy/nginx-health.conf;
#
# Бот слушает health на 127.0.0.1:8088 (HEALTH_PORT).

location /telegram-bot/health {
    proxy_pass http://127.0.0.1:8088/health;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    access_log off;
}
